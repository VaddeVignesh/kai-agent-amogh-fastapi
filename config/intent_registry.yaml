intents:
  voyage.summary:
    description: Full summary of a SPECIFIC voyage already identified by voyage number. Use ONLY when the user refers to a
      voyage by its number (e.g. 'voyage 1901', '1901'). Fetches finance KPIs, ops snapshot, and Mongo remarks for that one
      voyage. Do NOT use for fleet-wide questions or when no voyage number is present.
    route: single
    required_slots:
    - voyage_number
    optional_slots:
    - voyage_id
    - scenario
    needs:
      mongo: true
      finance: true
      ops: true
    mongo_intent: entity.voyage
    mongo_projection: null
    sql_hints:
      finance: "\nINTENT-SPECIFIC RULES (finance voyage.summary):\n- Query `finance_voyage_kpi`. Join `ops_voyage_summary`\
        \ only if needed to resolve vessel name.\n- MUST filter scenario: `scenario = COALESCE(%(scenario)s, 'ACTUAL')`.\n\
        - If Mongo has resolved a `voyage_id`, filter by `voyage_id` only. Do not also broaden the query by voyage_number.\n\
        - Use voyage_number only as fallback when `voyage_id` is not available.\n- Return voyage-level rows with exact aliases:\n  voyage_id, voyage_number,\
        \ revenue, total_expense, pnl, tce, total_commission,\n  voyage_start_date, voyage_end_date.\n- Keep LIMIT %(limit)s.\n"
      ops: ''
  voyage.entity:
    description: "Find voyages matching a filter \u2014 by port, vessel, date range, or cargo grade \u2014 when no specific\
      \ voyage number is given. Broader than voyage.summary. Use when the user says 'find voyages that...' or 'which voyages\
      \ went to X'."
    route: single
    required_slots: []
    optional_slots:
    - voyage_number
    - voyage_id
    - port_name
    - vessel_name
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: ''
      ops: ''
  voyage.metadata:
    description: "Document-level metadata for a SPECIFIC voyage from MongoDB only \u2014 fixture/commercial terms, cargo details,\
      \ route legs, bunkers, emissions, projected results, tags, and source URL. Use when the question is about voyage document\
      \ facts, not KPI performance trends."
    route: single
    required_slots: []
    optional_slots:
    - voyage_number
    - voyage_numbers
    - voyage_id
    needs:
      mongo: true
      finance: false
      ops: false
    mongo_intent: entity.voyage
    mongo_projection:
      _id: 0
      voyageId: 1
      voyageNumber: 1
      vesselName: 1
      vesselImo: 1
      url: 1
      extracted_at: 1
      tags: 1
      fixtures: 1
      revenues: 1
      expenses: 1
      legs.port_name: 1
      legs.activity_type: 1
      legs.display_order: 1
      cargoes.grade_name: 1
      cargoes.quantity: 1
      cargoes.unit: 1
      remarks: 1
      offhire_events: 1
      bunkers: 1
      emissions: 1
      projected_results: 1
      startDateUtc: 1
      endDateUtc: 1
    sql_hints:
      finance: ''
      ops: ''
  vessel.summary:
    description: "Full performance summary of a SPECIFIC vessel already identified by name or IMO. Use ONLY when the user\
      \ names a specific vessel (e.g. 'Vessel-001', IMO 9667485). Fetches all voyages for that vessel with finance + ops +\
      \ Mongo context. Do NOT use when the user is asking which vessel ranks best/worst across the fleet \u2014 use ranking.vessels\
      \ for that."
    route: single
    required_slots: []
    optional_slots:
    - vessel_name
    - imo
    needs:
      mongo: true
      finance: true
      ops: true
    mongo_intent: entity.vessel
    mongo_projection: null
    sql_hints:
      finance: "\nINTENT-SPECIFIC RULES (finance vessel.summary):\n- Query `finance_voyage_kpi`. Join `ops_voyage_summary`\
        \ only when needed to resolve vessel name.\n- MUST filter scenario: `scenario = COALESCE(%(scenario)s, 'ACTUAL')`.\n\
        - If imo/vessel_imo is available, filter by normalized IMO key:\n  REPLACE(f.vessel_imo::TEXT, '.0', '') = REPLACE(%(imo)s::TEXT,\
        \ '.0', '')\n- Return voyage-level rows with exact aliases:\n  voyage_id, voyage_number, revenue, total_expense, pnl,\
        \ tce, total_commission,\n  voyage_start_date.\n- Keep LIMIT %(limit)s.\n"
      ops: ''
  vessel.entity:
    description: Fetch Mongo entity document for a SPECIFIC named vessel. Use when only vessel metadata from Mongo is needed
      (no finance/ops). Requires vessel_name or imo.
    route: single
    required_slots: []
    optional_slots:
    - vessel_name
    - imo
    needs:
      mongo: true
      finance: false
      ops: false
    mongo_intent: entity.vessel
    mongo_projection: null
    sql_hints:
      finance: ''
      ops: ''
  vessel.metadata:
    description: "Technical and commercial metadata for a SPECIFIC vessel from MongoDB only \u2014 consumption profiles, hire\
      \ rate, scrubber, passage types, market type, contract history, tags. Use when the question is about vessel configuration\
      \ or spec, not voyage performance. Requires vessel_name or imo (or voyage_number to resolve the vessel)."
    route: single
    required_slots: []
    optional_slots:
    - vessel_name
    - imo
    - voyage_number
    - voyage_numbers
    needs:
      mongo: true
      finance: false
      ops: false
    mongo_intent: entity.vessel
    mongo_projection:
      _id: 0
      vesselId: 1
      name: 1
      imo: 1
      accountCode: 1
      hireRate: 1
      scrubber: 1
      marketType: 1
      consumption_profiles.profileName: 1
      consumption_profiles.passageProfile.passageType: 1
      consumption_profiles.passageProfile.consumption.speed: 1
      consumption_profiles.passageProfile.consumption.ifo: 1
      consumption_profiles.passageProfile.consumption.mgo: 1
      consumption_profiles.passageProfile.consumption.isDefault: 1
      consumption_profiles.nonPassageProfile.consumption: 1
      tags.category: 1
      tags.value: 1
      contract_history.list: 1
      isVesselOperating: 1
      extracted_at: 1
    sql_hints:
      finance: ''
      ops: ''
  ranking.vessel_metadata:
    description: Fleet-wide vessel metadata listing/ranking from MongoDB `vessels` only. Use when the user asks about metadata-style
      vessel attributes across the fleet such as operating status, scrubber, hire rate, pool tags, market type, default ballast/laden
      speed, or current contract duration. Do NOT answer these using finance aggregates as a proxy. Do NOT use this intent when
      the user also asks about profitability, PnL, revenue, offhire, delay risk, operational risk, commercial quality, or business
      quality; use finance + ops vessel ranking/analysis for those questions.
    route: single
    required_slots: []
    optional_slots:
    - limit
    needs:
      mongo: true
      finance: false
      ops: false
    mongo_intent: vessel.list_all
    mongo_projection:
      _id: 0
      vesselId: 1
      imo: 1
      name: 1
      accountCode: 1
      hireRate: 1
      scrubber: 1
      marketType: 1
      consumption_profiles.profileName: 1
      consumption_profiles.passageProfile.passageType: 1
      consumption_profiles.passageProfile.consumption.speed: 1
      consumption_profiles.passageProfile.consumption.isDefault: 1
      tags.category: 1
      tags.value: 1
      contract_history.list: 1
      isVesselOperating: 1
      extracted_at: 1
    sql_hints:
      finance: ''
      ops: ''
  cargo.details:
    description: Details and specifications for a specific cargo type on a specific voyage. Requires cargo_type to be identified
      in the query.
    route: single
    required_slots:
    - cargo_type
    optional_slots:
    - voyage_number
    - voyage_id
    needs:
      mongo: false
      finance: false
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: ''
      ops: ''
  port.details:
    description: "Statistics and information about ONE SPECIFIC named port that the user has explicitly named. Requires port_name\
      \ to be present in the query. Use ONLY for: 'tell me about Rotterdam', 'what happened at Houston', 'Singapore port activity'.\
      \ Do NOT use for fleet-wide questions like 'most visited port', 'busiest port', 'which port is visited most', 'most\
      \ common port', 'most commonly visited port' \u2014 use ranking.ports for ALL fleet-wide port questions."
    route: single
    required_slots:
    - port_name
    optional_slots:
    - date_from
    - date_to
    needs:
      mongo: false
      finance: false
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: ''
      ops: ''
  analysis.revenue_vs_pnl:
    description: Fleet-wide analysis of revenue vs PnL correlation across all voyages. Identifies voyages with high revenue
      but poor PnL or vice versa. No specific voyage or vessel required. Needs GROUP BY or full-scan dynamic SQL.
    route: composite
    required_slots: []
    optional_slots:
    - voyage_number
    - voyage_id
    - vessel_name
    - date_from
    - date_to
    needs:
      mongo: true
      finance: true
      ops: true
    mongo_intent: entity.auto
    mongo_projection: null
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance analysis.revenue_vs_pnl):

        - Query `finance_voyage_kpi`.

        - MUST filter scenario: `scenario = COALESCE(%(scenario)s, ''ACTUAL'')`.

        - Return voyage-level rows: voyage_id, voyage_number, revenue, total_expense, pnl, tce.

        - ORDER BY revenue DESC.

        - Keep LIMIT %(limit)s.

        '
      ops: ''
  analysis.high_revenue_low_pnl:
    description: Find voyages across the ENTIRE fleet that have high revenue but low or negative PnL. No specific voyage or
      vessel known. Needs dynamic SQL with threshold filters. Use when user asks 'which voyages made money but lost PnL' or
      similar anomaly detection.
    route: composite
    required_slots: []
    optional_slots:
    - min_revenue
    - max_pnl
    - limit
    - date_from
    - date_to
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance analysis.high_revenue_low_pnl):

        - Query `finance_voyage_kpi`.

        - MUST filter scenario: `scenario = COALESCE(%(scenario)s, ''ACTUAL'')`.

        - Filter for high revenue AND low/negative pnl using appropriate thresholds derived from the question.

        - Return exact aliases: voyage_id, voyage_number, revenue, total_expense, pnl, tce.

        - ORDER BY revenue DESC, pnl ASC.

        - Keep LIMIT %(limit)s.

        '
      ops: ''
  analysis.cargo_profitability:
    description: Fleet-wide profitability breakdown by cargo grade or cargo type. Aggregates PnL, revenue, and expenses grouped
      by cargo across all voyages. No specific voyage or vessel required. Needs GROUP BY cargo + AVG/SUM dynamic SQL.
    route: composite
    required_slots: []
    optional_slots:
    - cargo_grade
    - cargo_type
    - date_from
    - date_to
    - limit
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: "\nINTENT-SPECIFIC RULES (finance analysis.cargo_profitability):\n- Join `finance_voyage_kpi` with `ops_voyage_summary`\
        \ and unnest grades_json.\n- MUST filter scenario: `f.scenario = COALESCE(%(scenario)s, 'ACTUAL')`.\n- GROUP BY cargo\
        \ grade with AVG(pnl), AVG(revenue), COUNT(*) as voyage_count.\n- Return exact aliases: cargo_grade, avg_pnl, avg_revenue,\
        \ voyage_count.\n- If the question asks for margin or attractiveness, also return `AVG(f.pnl) / NULLIF(AVG(f.revenue),\
        \ 0) AS margin` and explain caveats from sample size / missing operational detail.\n- ORDER BY avg_pnl DESC NULLS LAST.\n- Keep LIMIT %(limit)s.\n- If the question also asks for common\
        \ ports or congestion/delay remarks for profitable cargo grades:\n  - still GROUP ONLY BY normalized cargo grade,\n\
        \  - add `string_agg(DISTINCT lower(trim(p->>'port_name')), ', ') AS most_common_ports`,\n  - aggregate only congestion/delay-like\
        \ remarks instead of grouping by raw remarks_json,\n  - return one row per cargo grade, never one row per remark payload.\n\
        - If the question compares ACTUAL vs WHEN_FIXED or asks for variance/difference between scenarios by cargo grade:\n\
        \  - include BOTH scenarios in the filtered set instead of ACTUAL-only,\n  - return exact aliases: cargo_grade, actual_avg_pnl,\
        \ when_fixed_avg_pnl, variance_diff,\n  - compute `variance_diff` as `ABS(AVG(CASE WHEN f.scenario = 'ACTUAL' THEN\
        \ f.pnl END) - AVG(CASE WHEN f.scenario = 'WHEN_FIXED' THEN f.pnl END))`,\n  - do NOT use statistical `VARIANCE()`\
        \ / `STDDEV()` functions for this question,\n  - ORDER BY variance_diff DESC NULLS LAST.\n"
      ops: ''
  analysis.by_module_type:
    description: Fleet-wide breakdown of average PnL, most common cargo grades and ports grouped by module type (TC Voyage,
      Spot, etc.). No specific entity required. Needs GROUP BY module_type dynamic SQL. Use this when module type is the grouped
      subject even if cargo grades or ports are requested as output columns.
    route: composite
    required_slots: []
    optional_slots:
    - limit
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance analysis.by_module_type):

        - Join `finance_voyage_kpi` f with `ops_voyage_summary` o on `f.voyage_id = o.voyage_id`.

        - MUST filter scenario: `f.scenario = COALESCE(%(scenario)s, ''ACTUAL'')`.

        - GROUP BY o.module_type.

        - Return exact aliases: module_type, avg_pnl, avg_revenue, voyage_count.

        - ORDER BY avg_pnl DESC.

        - Keep LIMIT %(limit)s.

        '
      ops: For module_type queries, ops should fetch ports_json and grades_json grouped by module_type using = ANY(%(voyage_ids)s)
        filter when voyage_ids are available, otherwise return aggregate port/grade data per module_type.
  analysis.segment_performance:
    description: Fleet-wide performance analysis by vessel segment, module type, or route. Identifies which segments are loss-making
      or high-performing. No specific entity required. Needs GROUP BY + aggregate dynamic SQL.
    route: composite
    required_slots: []
    optional_slots:
    - vessel_name
    - imo
    - module_type
    - segment
    - date_from
    - date_to
    - limit
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    guardrails:
      segment_performance_fallback: true
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance analysis.segment_performance):

        - Join `finance_voyage_kpi` f with `ops_voyage_summary` o on `f.voyage_id = o.voyage_id`.

        - MUST filter scenario: `f.scenario = COALESCE(%(scenario)s, ''ACTUAL'')`.

        - GROUP BY o.module_type (or segment if available).

        - Return exact aliases: module_type, avg_pnl, total_pnl, avg_revenue, voyage_count.

        - Include loss-making flag: CASE WHEN avg_pnl < 0 THEN true ELSE false END AS is_loss_making.

        - ORDER BY avg_pnl ASC (worst first).

        - Keep LIMIT %(limit)s.

        '
      ops: ''
  analysis.scenario_comparison:
    description: "Compare ACTUAL vs WHEN_FIXED vs BUDGET scenario values for one or more voyages. Use when the user explicitly\
      \ mentions scenario names like ACTUAL, WHEN_FIXED, BUDGET, or uses words like 'compare scenarios', 'variance between\
      \ scenarios'. voyage_numbers are optional \u2014 if absent, compares scenarios across all voyages."
    route: single
    required_slots: []
    optional_slots:
    - voyage_numbers
    - scenario
    needs:
      mongo: false
      finance: true
      ops: false
    mongo_intent: entity.skip
    mongo_projection: null
    guardrails:
      inject_voyage_numbers_param: true
      verify_scenario_variance_columns: true
    sql_hints:
      finance: "\nINTENT-SPECIFIC RULES (analysis.scenario_comparison):\n- Query `finance_voyage_kpi` comparing scenario='ACTUAL'\
        \ vs scenario='WHEN_FIXED'.\n- MUST filter: `voyage_number = ANY(%(voyage_numbers)s)`.\n- Return **one row per requested voyage_number**:\
        \ multiple finance rows (different voyage_id / vessel_imo) for the same voyage_number must be rolled up — SUM pnl/revenue\
        \ (actual and when-fixed), AVG tce (actual and when-fixed), variance from those rolled totals; `vessel_imo` may list\
        \ distinct IMOs comma-separated; pick a representative `voyage_id` (e.g. MAX).\n\
        - Return exact aliases:\n  voyage_id, voyage_number, vessel_imo, pnl_actual, pnl_when_fixed, pnl_variance,\n  tce_actual,\
        \ tce_when_fixed, tce_variance.\n- ORDER BY voyage_number.\n- Keep LIMIT %(limit)s.\n"
      ops: ''
  analysis.cost_breakdown:
    description: Detailed cost structure and expense breakdown analysis. Can be for a specific voyage/vessel or fleet-wide.
      Use when user asks about cost components, expense categories, or cost drivers.
    route: composite
    required_slots: []
    optional_slots:
    - voyage_number
    - vessel_name
    - date_from
    - date_to
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: "\nINTENT-SPECIFIC RULES (finance analysis.cost_breakdown):\n- Query `finance_voyage_kpi`.\n- MUST filter scenario:\
        \ `scenario = COALESCE(%(scenario)s, 'ACTUAL')`.\n- Return expense breakdown aliases: voyage_id, voyage_number, revenue,\
        \ total_expense, pnl,\n  and any available cost sub-components.\n- Keep LIMIT %(limit)s.\n"
      ops: ''
  analysis.variance:
    description: Variance analysis between scenarios (ACTUAL vs WHEN_FIXED) or time periods. Quantifies the gap between planned
      and actual values. Similar to analysis.scenario_comparison but focuses on delta/variance metric.
    route: composite
    required_slots: []
    optional_slots:
    - voyage_numbers
    - scenario
    - metric
    needs:
      mongo: false
      finance: true
      ops: false
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance analysis.variance):

        - Query `finance_voyage_kpi` comparing ACTUAL vs WHEN_FIXED.

        - Return variance metrics: pnl_variance, tce_variance, revenue_variance.

        - Keep LIMIT %(limit)s.

        '
      ops: ''
  analysis.profitability:
    description: "General fleet-wide profitability analysis \u2014 which voyages/vessels/routes are most profitable. No specific\
      \ entity required. Can be grouped by any dimension. Needs GROUP BY + aggregate dynamic SQL."
    route: composite
    required_slots: []
    optional_slots:
    - group_by
    - date_from
    - date_to
    - limit
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance analysis.profitability):

        - Query `finance_voyage_kpi`.

        - MUST filter scenario: `scenario = COALESCE(%(scenario)s, ''ACTUAL'')`.

        - Return voyage-level rows: voyage_id, voyage_number, pnl, revenue, total_expense, tce.

        - ORDER BY pnl DESC.

        - Keep LIMIT %(limit)s.

        '
      ops: ''
  ranking.voyages:
    description: "Fleet-wide ranking of ALL voyages by any metric \u2014 PnL, revenue, TCE, commission, offhire. No specific\
      \ voyage number or vessel name is known or needed. Use as fallback when a more specific ranking intent does not apply.\
      \ Needs ORDER BY + LIMIT dynamic SQL across the full dataset."
    route: composite
    required_slots: []
    optional_slots:
    - limit
    - metric
    - date_from
    - date_to
    - cargo_grade
    - port_name
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    guardrails:
      finance_no_ops_join: true
      require_kpi_columns: true
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance ranking.voyages):

        - Query ONLY `finance_voyage_kpi`. Do NOT join ops tables here.

        - MUST filter scenario: `scenario = COALESCE(%(scenario)s, ''ACTUAL'')`.

        - Return exact aliases: voyage_id, voyage_number, pnl, revenue, total_expense, tce, total_commission.

        - Rank by pnl DESC unless the question asks otherwise.

        - Keep LIMIT %(limit)s.

        '
      ops: ''
  ranking.pnl:
    description: Rank voyages or grouped entities by PnL. Use for requests like 'top 10 voyages by PnL' or 'highest profit
      voyages'. For cargo-grade phrasing, allow aggregate grouping by cargo grade.
    route: composite
    required_slots: []
    optional_slots:
    - limit
    - group_by
    - metric
    - date_from
    - date_to
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    guardrails:
      require_kpi_columns: true
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance ranking.pnl):

        - Rank by PnL metric.

        - If the question asks by cargo grade, GROUP BY normalized cargo grade and include avg_pnl/avg_revenue/voyage_count.

        - For cargo-grade ranking, include most_common_ports using string_agg(DISTINCT port_text, '', '') AS most_common_ports.

        - If the question asks by voyage, return voyage-level rows with pnl/revenue/total_expense.

        - When ordering by pnl or another numeric KPI, add `NULLS LAST`.

        - Keep LIMIT %(limit)s and scenario = COALESCE(%(scenario)s, ''ACTUAL'') when relevant.

        '
      ops: ''
  ranking.revenue:
    description: Rank voyages or grouped entities by revenue. Use for requests like 'top voyages by revenue' or 'highest revenue
      voyages'.
    route: composite
    required_slots: []
    optional_slots:
    - limit
    - group_by
    - metric
    - date_from
    - date_to
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    guardrails:
      require_kpi_columns: true
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance ranking.revenue):

        - Rank by revenue metric.

        - When ordering by revenue or another numeric KPI, add `NULLS LAST`.

        - Keep LIMIT %(limit)s and scenario = COALESCE(%(scenario)s, ''ACTUAL'') when relevant.

        '
      ops: ''
  ranking.port_calls:
    description: Rank voyages by number of port calls/port visits/port stops. Use for requests like 'Show 10 voyages with
      most port calls'.
    route: composite
    required_slots: []
    optional_slots:
    - limit
    - date_from
    - date_to
    needs:
      mongo: false
      finance: true
      ops: true
    mongo_intent: entity.skip
    mongo_projection: null
    guardrails:
      require_kpi_columns: true
    sql_hints:
      finance: '

        INTENT-SPECIFIC RULES (finance ranking.port_calls):

        - Use one row per voyage.

