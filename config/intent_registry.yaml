    sql_hints:
      finance: "\nINTENT-SPECIFIC RULES (finance ranking.vessels):\n- MANDATORY: Keep this vessel-level GROUP BY structure\
        \ and do NOT use a CTE that omits the ops join:\n  SELECT\n    REPLACE(f.vessel_imo::TEXT, '.0', '') AS vessel_imo,\n\
        \    MAX(o.vessel_name)                   AS vessel_name,\n    COUNT(DISTINCT f.voyage_id)          AS voyage_count,\n\
        \    AVG(f.pnl)                           AS avg_pnl,\n    SUM(f.pnl)                           AS total_pnl,\n    AVG(o.offhire_days)\
        \                 AS avg_offhire_days,\n    SUM(CASE WHEN o.is_delayed THEN 1 ELSE 0 END) AS delayed_voyage_count\n  FROM\
        \ finance_voyage_kpi f\n  JOIN ops_voyage_summary o\n    ON f.voyage_id = o.voyage_id\n  WHERE f.scenario = COALESCE(%(scenario)s,\
        \ 'ACTUAL')\n  GROUP BY REPLACE(f.vessel_imo::TEXT, '.0', '')\n\
        \  ORDER BY <chosen_metric> DESC NULLS LAST, voyage_count DESC\n  LIMIT %(limit)s\n- CRITICAL: vessel_name MUST come\
        \ from MAX(o.vessel_name) \u2014 it does NOT exist in finance_voyage_kpi.\n- NEVER use a CTE that queries finance_voyage_kpi\
        \ alone without joining ops_voyage_summary.\n- Pick aggregates and aliases based on the question:\n  - total profit\
        \ / total pnl / earned most -> SUM(f.pnl) AS total_pnl\n  - average pnl / profitability -> AVG(f.pnl) AS avg_pnl\n\
        \  - total revenue / earnings -> SUM(f.revenue) AS total_revenue\n  - average revenue -> AVG(f.revenue) AS avg_revenue\n\
        \  - total expense / most expensive -> SUM(f.total_expense) AS total_expense\n  - average expense / cost -> AVG(f.total_expense)\
        \ AS avg_total_expense\n  - TCE -> AVG(f.tce) AS avg_tce\n  - offhire / delay / operational risk -> AVG(o.offhire_days)\
        \ AS avg_offhire_days and SUM(CASE WHEN o.is_delayed THEN 1 ELSE 0 END) AS delayed_voyage_count\n- Always include voyage_count. Order by the metric implied\
        \ by the question, not always by voyage_count.\n- When ordering by avg/total KPI columns, add `NULLS LAST`.\n"
      ops: "\nINTENT-SPECIFIC RULES (ops ranking.vessels):\n- Query ONLY `ops_voyage_summary`.\n- CRITICAL: Use vessel_imo\
        \ NOT vessel_id. The column vessel_id does NOT exist.\n- Available columns include: voyage_id, voyage_number, vessel_imo,\
