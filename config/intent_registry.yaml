      \ or business quality. No specific vessel name or IMO is known or needed. Use when user asks 'which vessel has the most\
      \ voyages', 'which vessel earned the highest PnL', 'which vessels are profitable but operationally risky', 'rank vessels\
      \ by performance'. Needs GROUP BY vessel + aggregate dynamic SQL. Do NOT use when user names a specific vessel \u2014\
      \ use vessel.summary for that."
